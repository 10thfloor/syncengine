# Docker-compose NATS config — smoke/dev stack only.
#
# ⚠ NOT PRODUCTION-SAFE ⚠
# `default_permissions = publish:">", subscribe:">"` gives every client
# full pub/sub across the whole subject namespace. This is the same
# default shape as `syncengine dev` (see packages/cli/src/dev.ts ≈L504),
# and it's fine for local smokes, CI, and single-operator demos. It is
# NOT fine for any deploy where untrusted browsers / tenants share the
# cluster — a client joined to one workspace can publish into any other
# workspace's subject tree.
#
# Production path:
#   1. Swap this file for a config with `accounts {}` + `authorization.users`
#      (one per role) — @syncengine/core/nats-acl exports
#      `generateNatsPermissions(rolesByWsKey)` to produce the permission
#      objects. Wire the resulting config into a per-workspace NATS
#      server or use account-level isolation.
#   2. Issue short-lived JWT creds from syncengine.config.ts → auth.verify
#      so each browser connects with a workspace-scoped subject allow-list.
#   3. Remove `default_permissions`; only authenticated users with a
#      matching role should reach JetStream.

listen: 0.0.0.0:4222
http_port: 8222
server_name: syncengine_prod_smoke

websocket {
  listen: "0.0.0.0:9222"
  no_tls: true
}

jetstream {
  store_dir: "/data/jetstream"
  max_mem: 256MB
  max_file: 1GB
}

authorization {
  default_permissions = {
    publish = ">"
    subscribe = ">"
  }
}
