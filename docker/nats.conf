# Docker-compose NATS config. Mirrors the dev config in packages/cli/src/dev.ts,
# minus the dynamic store-dir substitution (we pin /data/jetstream inside the
# container).

listen: 0.0.0.0:4222
http_port: 8222
server_name: syncengine_prod_smoke

websocket {
  listen: "0.0.0.0:9222"
  no_tls: true
}

jetstream {
  store_dir: "/data/jetstream"
  max_mem: 256MB
  max_file: 1GB
}

authorization {
  default_permissions = {
    publish = ">"
    subscribe = ">"
  }
}
