# Production smoke stack — spins up NATS, Restate, and the test app image
# (built from apps/test/Dockerfile against a pre-built dist/) so `syncengine
# build` output can be exercised end-to-end on a laptop without colliding
# with `syncengine dev`'s :9080 binding.
#
# Usage:
#   pnpm build                    # produce apps/test/dist/ on the host
#   docker compose up --build     # boot the stack
#   ./scripts/smoke-docker.sh     # drive the smoke assertions
#
# See docs/superpowers/specs/2026-04-17-syncengine-serve-design.md §9a for
# the single-container deployment recipe this approximates.

services:
  nats:
    # Pinned to 2.12 to match the dev binary in @syncengine/nats-bin
    # (src/index.ts references v2.12.6). Bumping to the latest stable
    # minor keeps JetStream protocol + monitoring endpoints in sync
    # between `syncengine dev` and the Docker smoke stack.
    image: nats:2.12-alpine
    command: ["-c", "/etc/nats/nats.conf"]
    volumes:
      - ./docker/nats.conf:/etc/nats/nats.conf:ro
    expose:
      - "4222"
      - "8222"
    ports:
      # WebSocket listener — must be reachable from the browser so the
      # client can connect directly. Host port defaults to 19222 so the
      # prod stack coexists with `syncengine dev` (which binds 9222 on
      # the host). Override with NATS_WS_HOST_PORT.
      - "${NATS_WS_HOST_PORT:-19222}:9222"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 2s
      timeout: 2s
      retries: 30

  restate:
    # Pinned to 1.6 to match the dev binary in @syncengine/restate-bin
    # (src/index.ts references v1.6.2). The Restate TS SDK we depend on
    # (packages/server/package.json → @restatedev/restate-sdk ^1.13)
    # is forward-compatible with 1.6 servers; older server images
    # reject the current service-discovery manifest.
    image: docker.restate.dev/restatedev/restate:1.6
    environment:
      RESTATE_LOG_FILTER: "warn,restate=info"
      RESTATE_AUTO_PROVISION: "true"
      RESTATE_CLUSTER_NAME: "syncengine-smoke"
    ports:
      # Restate ingress — must be reachable from the browser for RPC.
      # Default 18080 dodges `syncengine dev`'s 8080 binding; override
      # with RESTATE_INGRESS_HOST_PORT if your dev stack isn't running.
      - "${RESTATE_INGRESS_HOST_PORT:-18080}:8080"
      - "9070:9070"
    healthcheck:
      # restatedev/restate image ships curl, not wget.
      test: ["CMD-SHELL", "curl -sSf http://localhost:9070/health || exit 1"]
      interval: 2s
      timeout: 2s
      retries: 30

  app:
    build:
      # Swap apps via `APP_DIR=apps/notepad docker compose up --build`
      # (scripts/smoke-docker.sh forwards APP_DIR too). Each app must
      # ship its own Dockerfile at the context root.
      context: ${APP_DIR:-apps/test}
      dockerfile: Dockerfile
    environment:
      # Server-side URLs — how THIS container reaches the infra over
      # the compose network. Used for provision RPCs and server→NATS.
      SYNCENGINE_NATS_URL: "ws://nats:9222"
      SYNCENGINE_RESTATE_URL: "http://restate:8080"
      NATS_URL: "nats://nats:4222"
      # Browser-facing URLs — injected into HTML so the client can
      # reach NATS + Restate directly from the host. Docker publishes
      # the corresponding ports above. Omit these two envs outside
      # Docker and the server falls back to SYNCENGINE_*_URL.
      SYNCENGINE_NATS_PUBLIC_URL: "ws://localhost:${NATS_WS_HOST_PORT:-19222}"
      SYNCENGINE_RESTATE_PUBLIC_URL: "http://localhost:${RESTATE_INGRESS_HOST_PORT:-18080}"
    depends_on:
      nats:
        condition: service_healthy
      restate:
        condition: service_healthy
    ports:
      - "3000:3000"
