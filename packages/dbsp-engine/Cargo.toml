[package]
name = "dbsp"
version = "0.2.0"
edition = "2021"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde-wasm-bindgen = "0.6.5"
wasm-bindgen = "0.2.117"
console_error_panic_hook = "0.1"

[lib]
crate-type = ["cdylib", "rlib"]

[profile.release]
# Panic hook provides readable messages; no need for full debug symbols
debug = false