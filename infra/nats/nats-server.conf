# NATS Server Configuration — local development
# JetStream enabled for durable per-workspace delta streams

listen: 0.0.0.0:4222
http_port: 8222

# WebSocket listener (browser clients connect here)
websocket {
  listen: "0.0.0.0:9222"
  no_tls: true
}

# JetStream — durable streams + consumers
jetstream {
  store_dir: /data/jetstream
  max_mem: 256MB
  max_file: 1GB
}

# ── Auth (uncomment for production) ──────────────────────────────────────
# authorization {
#     token: $NATS_AUTH_TOKEN
# }
# For development, auth is disabled. See infra/README.md for production setup.

# Permissive auth for local dev — lock this down for prod
authorization {
  default_permissions = {
    publish = ">"
    subscribe = ">"
  }
}

# Logging
debug: false
trace: false
logtime: true
