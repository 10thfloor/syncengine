version: "3.9"

services:
  # ── NATS with JetStream ──────────────────────────────────────────────────
  nats:
    image: nats:2.11-alpine
    container_name: dbsp-nats
    ports:
      - "4222:4222"   # NATS client
      - "9222:9222"   # WebSocket (browser clients)
      - "8222:8222"   # HTTP monitoring
    volumes:
      - ./nats/nats-server.conf:/etc/nats/nats-server.conf
      - nats-data:/data/jetstream
    command: ["-c", "/etc/nats/nats-server.conf"]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Restate Server ───────────────────────────────────────────────────────
  restate:
    image: docker.io/restatedev/restate:1.3
    container_name: dbsp-restate
    ports:
      - "8080:8080"   # Ingress (invoke services)
      - "9070:9070"   # Admin API (register deployments)
      - "9071:9071"   # Metrics
    volumes:
      - restate-data:/target
    environment:
      - RESTATE_OBSERVABILITY__LOG__FILTER=info
    depends_on:
      nats:
        condition: service_healthy

  # ── Workspace Service (TypeScript) ───────────────────────────────────────
  workspace-service:
    build:
      context: ../services/workspace
      dockerfile: Dockerfile
    container_name: dbsp-workspace-service
    ports:
      - "9080:9080"   # Restate service endpoint
    environment:
      - NATS_URL=nats://nats:4222
      - RESTATE_ENDPOINT=http://restate:8080
      - PORT=9080
    depends_on:
      nats:
        condition: service_healthy
      restate:
        condition: service_started

volumes:
  nats-data:
  restate-data:
