# Release workflow — cross-compile the CLI for every supported platform,
# package each build into a tarball (or zip for Windows), and attach
# everything to the GitHub Release for the current tag.
#
# Trigger: push of a `v*` tag (e.g. `v0.1.0`).
#
# Safety note: none of the run: steps interpolate user-controlled inputs
# (issue titles, PR bodies, commit messages, etc). Only static matrix
# values and pinned action refs are used.

name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-14
          - target: darwin-x64
            runner: macos-14
          - target: linux-arm64
            runner: ubuntu-latest
          - target: linux-x64
            runner: ubuntu-latest
          - target: windows-x64
            runner: ubuntu-latest

    env:
      SYNCENGINE_TARGETS: ${{ matrix.target }}
      TARGET: ${{ matrix.target }}

    steps:
      - uses: actions/checkout@v4

      - name: setup pnpm
        uses: pnpm/action-setup@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3

      # @syncengine/test-utils has a `file:../dbsp-engine/pkg` dep that
      # pnpm resolves at install time — pkg/ has to exist first.
      - name: setup rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: setup wasm-pack
        run: cargo install wasm-pack --version 0.13.1 --locked

      - name: build dbsp wasm
        working-directory: packages/dbsp-engine
        run: wasm-pack build --target bundler --out-dir pkg --scope syncengine

      - name: install
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: compile CLI
        run: pnpm -F @syncengine/cli compile:all

      - name: package
        shell: bash
        run: |
          set -euo pipefail
          cd "packages/cli/dist/$TARGET"
          if [[ "$TARGET" == windows-* ]]; then
            zip -9 "../../syncengine-$TARGET.zip" syncengine.exe
          else
            tar -czf "../../syncengine-$TARGET.tar.gz" syncengine
          fi

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: syncengine-${{ matrix.target }}
          path: packages/cli/syncengine-${{ matrix.target }}.*
          if-no-files-found: error

  publish:
    name: attach artifacts to release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: generate SHA256SUMS
        run: |
          set -euo pipefail
          cd artifacts
          sha256sum syncengine-*.tar.gz syncengine-*.zip > SHA256SUMS

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/syncengine-*.tar.gz
            artifacts/syncengine-*.zip
            artifacts/SHA256SUMS
          generate_release_notes: true
