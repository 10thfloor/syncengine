# Release workflow — cross-compile the CLI for every supported platform,
# package each build into a tarball (or zip for Windows), and attach
# everything to the GitHub Release for the current tag.
#
# Trigger: push of a `v*` tag (e.g. `v0.1.0`).
#
# Safety note: none of the run: steps interpolate user-controlled inputs
# (issue titles, PR bodies, commit messages, etc). Only static matrix
# values and pinned action refs are used.

name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  source:
    name: build source tarball
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: setup wasm-pack
        run: cargo install wasm-pack --version 0.13.1 --locked

      - name: setup pnpm
        uses: pnpm/action-setup@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: build dbsp wasm
        working-directory: packages/dbsp-engine
        run: wasm-pack build --target bundler --out-dir pkg --scope syncengine

      - name: package source tarball
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          V="${REF_NAME#v}"
          mkdir -p _release
          # The tarball layout is `syncengine-source-<v>/{packages,
          # package.json, pnpm-workspace.yaml, pnpm-lock.yaml}` — a
          # standalone pnpm workspace the CLI can `pnpm install` inside
          # to materialize runtime deps (restate-sdk, nats clients, etc.)
          # in ~/.syncengine/source/<v>/node_modules/.
          staging="_staging/syncengine-source-${V}"
          mkdir -p "${staging}/packages"
          for pkg in core client server vite-plugin http-core gateway-core observe; do
            cp -R "packages/${pkg}" "${staging}/packages/${pkg}"
          done
          mkdir -p "${staging}/packages/dbsp-engine"
          cp -R packages/dbsp-engine/pkg "${staging}/packages/dbsp-engine/pkg"
          # Standalone workspace root: minimal package.json + workspace
          # manifest scoped to the framework packages. Lockfile carries
          # the resolved dep tree so install is deterministic.
          cat > "${staging}/package.json" <<'JSON'
          {
            "name": "syncengine-source-cache",
            "private": true,
            "version": "0.0.0",
            "packageManager": "pnpm@10.6.4"
          }
          JSON
          cat > "${staging}/pnpm-workspace.yaml" <<'YAML'
          packages:
            - 'packages/*'
            - 'packages/dbsp-engine/pkg'
          YAML
          # Strip tests + dev-only files to keep the tarball lean.
          # Done before lockfile generation so pnpm only resolves prod deps.
          find "${staging}" -type d -name '__tests__' -prune -exec rm -rf {} +
          find "${staging}" -type f \( -name '*.test.ts' -o -name '*.test.tsx' -o -name '*.spec.ts' \) -delete
          find "${staging}" -type d -name 'node_modules' -prune -exec rm -rf {} +
          find "${staging}" -type d -name 'dist' -prune -exec rm -rf {} +
          # Strip devDependencies + scripts from every framework package.json
          # so the generated lockfile + cache install carry only runtime deps.
          # Test files referencing devDeps (vitest, typescript, tsx) were
          # removed above, so nothing at runtime imports from devDeps.
          while IFS= read -r -d '' pj; do
            node -e "const fs=require('fs');const p='${pj//\'/\\\'}';const j=JSON.parse(fs.readFileSync(p,'utf8'));delete j.devDependencies;delete j.scripts;fs.writeFileSync(p,JSON.stringify(j,null,2)+'\n')"
          done < <(find "${staging}/packages" -maxdepth 2 -name package.json -print0)
          # Generate a cache-scoped lockfile (NOT the repo's root lockfile
          # — that's scoped to apps/, cli, etc. which aren't in the tarball).
          # User CLI will run `pnpm install --frozen-lockfile` against this.
          (cd "${staging}" && pnpm install --lockfile-only --ignore-scripts)
          tar -czf "_release/syncengine-source-${V}.tar.gz" -C "_staging" "syncengine-source-${V}"

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: syncengine-source
          path: _release/*.tar.gz
          if-no-files-found: error

  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-14
          - target: darwin-x64
            runner: macos-14
          - target: linux-arm64
            runner: ubuntu-latest
          - target: linux-x64
            runner: ubuntu-latest
          - target: windows-x64
            runner: ubuntu-latest

    env:
      SYNCENGINE_TARGETS: ${{ matrix.target }}
      TARGET: ${{ matrix.target }}

    steps:
      - uses: actions/checkout@v4

      - name: setup pnpm
        uses: pnpm/action-setup@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3

      # @syncengine/test-utils has a `file:../dbsp-engine/pkg` dep that
      # pnpm resolves at install time — pkg/ has to exist first.
      - name: setup rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: setup wasm-pack
        run: cargo install wasm-pack --version 0.13.1 --locked

      - name: build dbsp wasm
        working-directory: packages/dbsp-engine
        run: wasm-pack build --target bundler --out-dir pkg --scope syncengine

      - name: install
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: compile CLI
        run: pnpm -F @syncengine/cli compile:all

      - name: package
        shell: bash
        run: |
          set -euo pipefail
          cd "packages/cli/dist/$TARGET"
          if [[ "$TARGET" == windows-* ]]; then
            zip -9 "../../syncengine-$TARGET.zip" syncengine.exe
          else
            tar -czf "../../syncengine-$TARGET.tar.gz" syncengine
          fi

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: syncengine-${{ matrix.target }}
          path: packages/cli/syncengine-${{ matrix.target }}.*
          if-no-files-found: error

  publish:
    name: attach artifacts to release
    runs-on: ubuntu-latest
    needs: [build, source]
    steps:
      - uses: actions/checkout@v4

      - name: download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: generate SHA256SUMS
        run: |
          set -euo pipefail
          cd artifacts
          sha256sum syncengine-*.tar.gz syncengine-*.zip > SHA256SUMS

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/syncengine-*.tar.gz
            artifacts/syncengine-*.zip
            artifacts/SHA256SUMS
          generate_release_notes: true
