# CI — run typecheck + tests on every push and PR. This is the signal
# that gates merges; the release workflow in release.yml handles tagged
# builds separately.
#
# Safety note: none of the run: steps interpolate user-controlled inputs
# (issue titles, PR bodies, commit messages, etc). Only matrix values
# and pinned action refs are used.

name: ci

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22]

    steps:
      - uses: actions/checkout@v4

      - name: setup pnpm
        uses: pnpm/action-setup@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      # @syncengine/observe's tests use `bun:test` imports and Bun's
      # built-in test runner. Pin to match dev machines.
      - name: setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3

      # wasm-pack is needed by the postinstall hook that builds the
      # DBSP engine. Pinned version to match what contributors install.
      - name: setup rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: setup wasm-pack
        run: cargo install wasm-pack --version 0.13.1 --locked

      # Build the DBSP WASM bundle before install — @syncengine/test-utils
      # has a `file:../dbsp-engine/pkg` dependency that pnpm resolves at
      # install time, and the pkg/ dir only exists after wasm-pack runs.
      # Using wasm-pack directly (not `pnpm build:wasm`) because the pnpm
      # script also runs sync-wasm.mjs which needs node_modules that don't
      # exist yet. The postinstall hook re-runs the full build:wasm,
      # which is cheap when the output is already fresh.
      - name: build dbsp wasm
        working-directory: packages/dbsp-engine
        run: wasm-pack build --target bundler --out-dir pkg --scope syncengine

      - name: install
        run: pnpm install --frozen-lockfile

      - name: typecheck
        run: pnpm typecheck

      - name: test
        run: pnpm test
