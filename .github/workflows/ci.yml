# CI — run typecheck + tests on every push and PR. This is the signal
# that gates merges; the release workflow in release.yml handles tagged
# builds separately.
#
# Safety note: none of the run: steps interpolate user-controlled inputs
# (issue titles, PR bodies, commit messages, etc). Only matrix values
# and pinned action refs are used.

name: ci

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22]

    steps:
      - uses: actions/checkout@v4

      - name: setup pnpm
        uses: pnpm/action-setup@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      # wasm-pack is needed by the postinstall hook that builds the
      # DBSP engine. Pinned version to match what contributors install.
      - name: setup rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: setup wasm-pack
        run: cargo install wasm-pack --version 0.13.1 --locked

      - name: install
        run: pnpm install --frozen-lockfile

      - name: typecheck
        run: pnpm typecheck

      - name: test
        run: pnpm test
