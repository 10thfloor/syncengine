<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 420" width="380" height="380" role="img" aria-label="Concentric hexagonal rings from schema at the center to service at the edge">
  <!-- Flat-top hexagons, each inscribed inside the previous. Circumradii
       200 / 168 / 136 / 104 / 72 / 40; vertex angles 0,60,120,180,240,300
       around (210, 210). Heights at top edge: 36.8, 64.5, 92.2, 119.9,
       147.6, 175.4 — so labels sit between consecutive flat tops. -->
  <polygon points="410,210 310,36.8 110,36.8 10,210 110,383.2 310,383.2" fill="#ef4444" />
  <polygon points="378,210 294,64.5 126,64.5 42,210 126,355.5 294,355.5" fill="#f97316" />
  <polygon points="346,210 278,92.2 142,92.2 74,210 142,327.8 278,327.8" fill="#eab308" />
  <polygon points="314,210 262,119.9 158,119.9 106,210 158,300.1 262,300.1" fill="#22c55e" />
  <polygon points="282,210 246,147.6 174,147.6 138,210 174,272.4 246,272.4" fill="#6366f1" />
  <polygon points="250,210 230,175.4 190,175.4 170,210 190,244.6 230,244.6" fill="#f472b6" />
  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">
    <text x="210" y="55">service</text>
    <text x="210" y="82">workflow</text>
    <text x="210" y="110">bus</text>
    <text x="210" y="138">view</text>
    <text x="210" y="165">entity</text>
    <text x="210" y="215">schema</text>
  </g>
</svg>
